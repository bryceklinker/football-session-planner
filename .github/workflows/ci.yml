name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AZURE_LOCATION: centralus
  
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore dependencies
        run: dotnet restore FootballPlanner.slnx

      - name: Restore dotnet tools
        run: dotnet tool restore

      - name: Build
        run: make build

      - name: Install Playwright browsers
        run: pwsh tests/FootballPlanner.Feature.Tests/bin/Release/net10.0/playwright.ps1 install chromium

      - name: Run unit tests
        run: make test-unit

      - name: Run integration tests
        run: make test-integration

      - name: Create .env for Docker Compose
        # Variable names match what docker-compose.yml expects:
        #   DB_PASSWORD      → SA_PASSWORD on the SQL Server container
        #   AUTH0_DOMAIN     → Auth0__Domain on the API container + SWA build arg
        #   AUTH0_AUDIENCE   → Auth0__Audience on the API container + SWA build arg
        #   AUTH0_CLIENT_ID  → SWA build arg (injected into Blazor appsettings.json)
        run: |
          echo "AUTH0_DOMAIN=${{ secrets.AUTH0_DOMAIN }}" >> .env
          echo "AUTH0_AUDIENCE=${{ secrets.AUTH0_DEV_AUDIENCE }}" >> .env
          echo "AUTH0_CLIENT_ID=${{ secrets.AUTH0_DEV_CLIENT_ID }}" >> .env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env

      - name: Start Docker Compose stack
        run: |
          make up
          curl --retry 20 --retry-delay 5 --retry-all-errors -s http://localhost:4280/ > /dev/null

      - name: Run feature tests
        id: feature-tests
        env:
          AUTH0_TEST_USER_EMAIL: ${{ secrets.AUTH0_TEST_USER_EMAIL }}
          AUTH0_TEST_USER_PASSWORD: ${{ secrets.AUTH0_TEST_USER_PASSWORD }}
        run: make test-feature

      - name: Upload Playwright artifacts
        if: failure() && steps.feature-tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: tests/FootballPlanner.Feature.Tests/bin/Release/net10.0/playwright-videos/

      - name: Dump Docker Compose logs
        if: failure() && steps.feature-tests.outcome == 'failure'
        run: make logs

      - name: Stop Docker Compose stack
        if: always()
        run: make down

  pulumi-preview:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Ensure Pulumi state storage
        uses: ./.github/actions/ensure-pulumi-state
        with:
          client_id: ${{ secrets.ARM_CLIENT_ID }}
          client_secret: ${{ secrets.ARM_CLIENT_SECRET }}
          tenant_id: ${{ secrets.ARM_TENANT_ID }}
          subscription_id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Pulumi Preview
        uses: pulumi/actions@v6
        with:
          command: preview
          stack-name: prod
          work-dir: infra
          backend-url: azblob://pulumi-state?storage_account=pulumistatestore
        env:
          PULUMI_ACCESS_TOKEN: ""
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
